# Gold Analysis Web default configuration.
# Keep secrets out of this file. Put API keys and auth tokens in environment
# variables, using .env.example as the local template.

app:
  name: "Gold Analysis Web"
  environment: "development"

security:
  bearer_token_env: "API_AUTH_TOKEN"
  # Development-only fallback token. Disable in production by setting
  # allow_insecure_dev_token to false and exporting API_AUTH_TOKEN.
  allow_insecure_dev_token: true
  development_token: "change-me-local-token"

cors:
  allowed_origins:
    - "http://localhost:5178"
    - "http://127.0.0.1:5178"
    - "http://154.219.120.25:5178"

realtime:
  frontend_refresh_seconds: 10
  max_data_delay_seconds: 5

storage:
  kline_db_path: "data/kline_bars.sqlite"
  kline_retention:
    1min_days: 30
    1day_days: 31
    1month_months: 36

market_review:
  commodities:
    gold:
      label: "黄金30日行情"
      seed_file: "黄金30日行情.md"
      currency: "CNY"
      unit: "g"
      theme: "#c89a2b"
    silver:
      label: "白银30日行情"
      seed_file: "白银30日行情.md"
      currency: "CNY"
      unit: "kg"
      theme: "#7d8da1"
    platinum:
      label: "铂金30日行情"
      seed_file: "铂金30日行情.md"
      currency: "CNY"
      unit: "g"
      theme: "#7f6bb2"

display:
  currency: "CNY"
  unit: "g"
  source_currency: "USD"
  source_unit: "oz"
  # Reference checked on 2026-06-26 from open.er-api.com latest USD rates.
  usd_cny_rate: 6.808596
  troy_ounce_grams: 31.1034768

data_sources:
  active: "icbc"
  fallback: ""
  price:
    icbc:
      type: "http"
      label: "工商银行积存金"
      description: "工商银行积存金实时主动积存价格。Native CNY/g price."
      name: "工商银行积存金"
      symbol: "080020000521"
      endpoint: "https://mybank.icbc.com.cn/servlet/AsynGetDataServlet?tranCode=A00622"
      api_key_env: ""
      response_format: "icbc_accrual"
      kline_mode: "history"
      legacy_tls: true
      currency: "CNY"
      unit: "g"
      headers:
        User-Agent: "Mozilla/5.0"
        Referer: "https://mybank.icbc.com.cn/icbc/newperbank/perbank3/gold/goldaccrual_query_out.jsp"
      json_paths:
        price: "latest.price"
        timestamp: "latest.timestamp"
      timeout_seconds: 5
      max_data_delay_seconds: 43200
      min_price: 200
      max_price: 1500
    jdjygold_zheshang:
      type: "http"
      label: "浙商银行积存金"
      description: "京东金融浙商银行积存金实时价格，Native CNY/g price."
      name: "浙商银行积存金"
      symbol: "1961543816"
      endpoint: "https://api.jdjygold.com/gw2/generic/jrm/h5/m/stdLatestPrice?productSku=1961543816"
      api_key_env: ""
      response_format: "jdjygold_latest"
      day_range_endpoint: "https://api.jdjygold.com/gw/generic/hj/h5/m/todayPrices"
      day_range_method: "post"
      day_range_response_format: "jdjygold_today_prices"
      day_range_mode: "reported"
      history_endpoint: "https://api.jdjygold.com/gw/generic/hj/h5/m/historyPrices"
      history_method: "post"
      history_params:
        period: "w"
      history_response_format: "jdjygold_history_prices"
      kline_mode: "intraday"
      currency: "CNY"
      unit: "g"
      headers:
        User-Agent: "Mozilla/5.0"
        Referer: "https://golds.jd.com/"
      json_paths:
        price: "latest.price"
        timestamp: "latest.timestamp"
      timeout_seconds: 5
      max_data_delay_seconds: 43200
      min_price: 200
      max_price: 1500
    hongyun_gold_reference:
      type: "http"
      label: "民生银行积存金"
      description: "京东金融民生银行积存金公开源实时价格，Native CNY/g price."
      name: "民生银行积存金"
      symbol: "P005"
      endpoint: "https://api.jdjygold.com/gw/generic/hj/h5/m/latestPrice"
      api_key_env: ""
      response_format: "jdjygold_latest"
      day_range_endpoint: "https://api.jdjygold.com/gw/generic/hj/h5/m/todayPrices"
      day_range_method: "post"
      day_range_response_format: "jdjygold_today_prices"
      day_range_mode: "reported"
      kline_mode: "intraday"
      currency: "CNY"
      unit: "g"
      headers:
        User-Agent: "Mozilla/5.0"
        Referer: "https://golds.jd.com/"
      json_paths:
        price: "latest.price"
        timestamp: "latest.timestamp"
      timeout_seconds: 5
      max_data_delay_seconds: 43200
      min_price: 200
      max_price: 1500
retry:
  max_attempts: 3
  base_delay_seconds: 0.2
  multiplier: 2

indicators:
  stop_loss:
    type: "SMA"
    period: 20
    multiplier: 2
    volatility_window: 20
  moving_average:
    short_period: 5
    long_period: 20
  bollinger_bands:
    period: 20
    stddev_multiplier: 2

decision_rules:
  min_cross_strength: 0.01
  require_bollinger_upper_breakout: true
  min_confidence: 0.7
  sentiment_required_for_buy: "positive"

news:
  provider: "newsapi"
  endpoint: "https://newsapi.org/v2/everything"
  api_key_env: "NEWS_API_KEY"
  query: "gold OR XAUUSD OR bullion"
  language: "en"
  page_size: 10
  demo_articles:
    - title: "金价上涨，避险与抗通胀需求升温"
      description: "央行持续购金支撑金价。"
    - title: "美元走强限制黄金涨幅"
      description: "加息不确定性压制短期买盘。"
  sentiment:
    positive_keywords:
      - "上涨"
      - "避险"
      - "抗通胀"
      - "央行购金"
      - "rallies"
      - "inflation hedge"
      - "central bank buying"
      - "safe haven demand"
      - "geopolitical risk"
      - "weaker dollar"
      - "rate cut"
    negative_keywords:
      - "美元走强"
      - "加息"
      - "strong dollar"
      - "rate hike"
      - "hawkish fed"
      - "profit taking"
      - "yields rise"
      - "risk appetite"
    positive_threshold: 2
    negative_threshold: -2

portfolio_defaults:
  buy_price: 540
  quantity: 1
