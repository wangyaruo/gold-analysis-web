# Gold Analysis Web default configuration.
# Keep secrets out of this file. Put API keys and auth tokens in environment
# variables, using .env.example as the local template.

app:
  name: "Gold Analysis Web"
  environment: "development"

security:
  bearer_token_env: "API_AUTH_TOKEN"
  # Development-only fallback token. Disable in production by setting
  # allow_insecure_dev_token to false and exporting API_AUTH_TOKEN.
  allow_insecure_dev_token: true
  development_token: "change-me-local-token"

cors:
  allowed_origins:
    - "http://localhost:5178"
    - "http://127.0.0.1:5178"
    - "http://154.219.120.25:5178"

realtime:
  frontend_refresh_seconds: 10
  max_data_delay_seconds: 5

display:
  currency: "CNY"
  unit: "g"
  source_currency: "USD"
  source_unit: "oz"
  # Reference checked on 2026-06-26 from open.er-api.com latest USD rates.
  usd_cny_rate: 6.808596
  troy_ounce_grams: 31.1034768

data_sources:
  active: "twelve_data"
  fallback: "demo"
  price:
    cngold_spot:
      type: "http"
      label: "中国黄金网 现货金价"
      description: "中国黄金网(汇通财经)现货黄金行情，美元/盎司，后端换算人民币/克。"
      name: "cngold_spot"
      symbol: "XAUUSD"
      endpoint: "https://api.jijinhao.com/quoteCenter/realTime.htm?codes=JO_92233"
      api_key_env: ""
      response_format: "jsvar"
      headers:
        User-Agent: "Mozilla/5.0"
        Referer: "https://quote.cngold.org/"
      json_paths:
        price: "JO_92233.q63"
        timestamp: "JO_92233.time"
      timeout_seconds: 8
      max_data_delay_seconds: 43200
      min_price: 500
      max_price: 8000
    twelve_data:
      type: "http"
      label: "Twelve Data 现货金价 XAU/USD"
      description: "Twelve Data 授权金价接口（带 API Key），稳定实时。"
      name: "twelve_data"
      symbol: "XAU/USD"
      endpoint: "https://api.twelvedata.com/price?symbol=XAU/USD"
      api_key_env: "TWELVE_DATA_KEY"
      auth_header: "Authorization"
      response_format: "json"
      headers:
        User-Agent: "Mozilla/5.0"
      json_paths:
        price: "price"
        timestamp: "timestamp"
      timeout_seconds: 8
      min_price: 500
      max_price: 8000
    demo:
      type: "demo"
      label: "演示参考数据"
      description: "Offline synthetic reference data used when external sources fail."
      name: "reference-fallback-2026-06-26"
      symbol: "XAUUSD"
      # Reference checked on 2026-06-26: spot gold around 4018.77 USD/oz.
      # The live Yahoo source above should be preferred whenever network works.
      base_price: 4018.77
      volatility: 8.0
      min_price: 500
      max_price: 8000
    eastmoney_au9999:
      type: "http"
      label: "东方财富 AU9999"
      description: "Eastmoney AU9999 quote from the 黄金9999 page. Native CNY/g price."
      name: "eastmoney_au9999"
      symbol: "AU9999"
      endpoint: "https://futsseapi.eastmoney.com/static/118_AU9999_qt?callbackName=callback&field=name,sc,dm,p,zsjd,zdf,zde,utime,o,zjsj,qrspj,h,l,mrj,mcj,vol,cclbh,zt,dt,np,wp,ccl,rz,cje,mcl,mrl,jjsj,j,lb,zf&token=1101ffec61617c99be287c1bec3085ff"
      api_key_env: ""
      response_format: "jsonp"
      currency: "CNY"
      unit: "g"
      headers:
        User-Agent: "Mozilla/5.0"
        Referer: "https://quote.eastmoney.com/globalfuture/AU9999.html?jump_to_web=true"
      json_paths:
        price: "qt.p"
        timestamp: "qt.utime"
      timeout_seconds: 5
      # AU9999 can stop updating between domestic trading sessions; keep
      # realtime feeds at 5s, but allow this reference source an intraday grace.
      max_data_delay_seconds: 43200
      min_price: 200
      max_price: 1500

retry:
  max_attempts: 3
  base_delay_seconds: 0.2
  multiplier: 2

indicators:
  stop_loss:
    type: "SMA"
    period: 20
    multiplier: 2
    volatility_window: 20
  moving_average:
    short_period: 5
    long_period: 20
  bollinger_bands:
    period: 20
    stddev_multiplier: 2

decision_rules:
  min_cross_strength: 0.01
  require_bollinger_upper_breakout: true
  min_confidence: 0.7
  sentiment_required_for_buy: "positive"

news:
  provider: "newsapi"
  endpoint: "https://newsapi.org/v2/everything"
  api_key_env: "NEWS_API_KEY"
  query: "gold OR XAUUSD OR bullion"
  language: "en"
  page_size: 10
  demo_articles:
    - title: "金价上涨，避险与抗通胀需求升温"
      description: "央行持续购金支撑金价。"
    - title: "美元走强限制黄金涨幅"
      description: "加息不确定性压制短期买盘。"
  sentiment:
    positive_keywords:
      - "上涨"
      - "避险"
      - "抗通胀"
      - "央行购金"
      - "rallies"
      - "inflation hedge"
      - "central bank buying"
      - "safe haven demand"
      - "geopolitical risk"
      - "weaker dollar"
      - "rate cut"
    negative_keywords:
      - "美元走强"
      - "加息"
      - "strong dollar"
      - "rate hike"
      - "hawkish fed"
      - "profit taking"
      - "yields rise"
      - "risk appetite"
    positive_threshold: 2
    negative_threshold: -2

portfolio_defaults:
  buy_price: 540
  quantity: 1
