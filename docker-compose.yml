services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    environment:
      APP_ENV: production
      API_AUTH_TOKEN: ${API_AUTH_TOKEN:-change-me-local-token}
      GOLD_API_KEY: ${GOLD_API_KEY:-}
      NEWS_API_KEY: ${NEWS_API_KEY:-}
    ports:
      - "8000:8000"

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    environment:
      VITE_API_BASE_URL: http://127.0.0.1:8000
      VITE_API_TOKEN: ${API_AUTH_TOKEN:-change-me-local-token}
    ports:
      - "5173:80"
    depends_on:
      - backend
