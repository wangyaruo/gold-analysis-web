services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    environment:
      APP_ENV: production
      API_AUTH_TOKEN: ${API_AUTH_TOKEN:-change-me-local-token}
      GOLD_API_KEY: ${GOLD_API_KEY:-}
      NEWS_API_KEY: ${NEWS_API_KEY:-}
      ALERT_SMTP_HOST: ${ALERT_SMTP_HOST:-}
      ALERT_SMTP_PORT: ${ALERT_SMTP_PORT:-587}
      ALERT_SMTP_USERNAME: ${ALERT_SMTP_USERNAME:-}
      ALERT_SMTP_PASSWORD: ${ALERT_SMTP_PASSWORD:-}
      ALERT_FROM_EMAIL: ${ALERT_FROM_EMAIL:-}
      ALERT_SMTP_USE_TLS: ${ALERT_SMTP_USE_TLS:-true}
    ports:
      - "8318:8318"

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    environment:
      VITE_API_BASE_URL: ${VITE_API_BASE_URL:-}
      VITE_API_TOKEN: ${API_AUTH_TOKEN:-change-me-local-token}
    ports:
      - "5178:80"
    depends_on:
      - backend
